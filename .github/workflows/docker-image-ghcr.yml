name: Publish Docker image to GHCR

on:
  push:
    branches:
      - main
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (tag/branch/commit). Defaults to current ref.'
        required: false
        type: string
      image_tag:
        description: 'Image tag override. Defaults to pushed tag or short SHA.'
        required: false
        type: string
      latest:
        description: 'Also publish ghcr latest tag'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push multi-arch image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Resolve image metadata
        id: vars
        shell: bash
        run: |
          GHCR_REPOSITORY="${GITHUB_REPOSITORY,,}"

          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            IMAGE_TAG="${{ github.event.inputs.image_tag }}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            IMAGE_TAG="${GITHUB_REF#refs/tags/}"
          else
            IMAGE_TAG="sha-$(git rev-parse --short HEAD)"
          fi

          PUBLISH_LATEST=false
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.latest }}" = "true" ]; then
            PUBLISH_LATEST=true
          elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            PUBLISH_LATEST=true
          elif [[ "${GITHUB_REF}" == refs/tags/* ]] && [[ "${IMAGE_TAG}" != *-* ]]; then
            PUBLISH_LATEST=true
          fi

          TAGS="ghcr.io/${GHCR_REPOSITORY}:${IMAGE_TAG}"
          if [ "$PUBLISH_LATEST" = "true" ]; then
            TAGS="${TAGS}"$'\n'"ghcr.io/${GHCR_REPOSITORY}:latest"
          fi

          echo "${IMAGE_TAG}" > VERSION

          echo "ghcr_repository=${GHCR_REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "publish_latest=${PUBLISH_LATEST}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.vars.outputs.ghcr_repository }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.vars.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Publish summary
        run: |
          echo "Published image tags:"
          echo "${{ steps.vars.outputs.tags }}"
